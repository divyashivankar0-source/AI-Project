<!DOCTYPE html>
<html>
<head>
    <title>AI Sentiment Analysis</title>
</head>
<body>
    <h2>Enter text to analyze sentiment</h2>
    <form method="POST">
        <textarea name="user_text" rows="4" cols="50"></textarea><br><br>
        <button type="submit">Analyze</button>
    </form>

    {% if sentiment %}
        <h3>Result: {{ sentiment }}</h3>
    {% endif %}
</body>
</html>
